name: Sync to Public Repo

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub release?'
        required: false
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
      
      - name: Setup Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Remove Private Files
        run: |
          while IFS= read -r pattern; do
            [[ "$pattern" =~ ^#.*$ ]] && continue
            [[ -z "$pattern" ]] && continue
            echo "Removing: $pattern"
            rm -rf $pattern
          done < .syncignore
          rm -f .syncignore
      
      - name: Prepare npm README
        run: |
          if [ -f NPM_README.md ]; then
            mv NPM_README.md README.md
            echo "Swapped NPM_README.md to README.md"
          else
            echo "NPM_README.md not found, keeping existing README.md"
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Update Version in package.json
        run: npm version ${{ inputs.version }} --no-git-tag-version || echo "Version already set to ${{ inputs.version }}"
      
      - name: Push to Public Repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          PUBLIC_REPO: ${{ secrets.PUBLIC_REPO_URL }}
        run: |
          git remote add public https://x-access-token:${PUBLIC_REPO_TOKEN}@${PUBLIC_REPO}
          git add .
          git commit -m "Release v${{ inputs.version }}" || echo "No changes to commit"
          git push public HEAD:main --force
      
      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          gh release create v${{ inputs.version }} \
            --title "v${{ inputs.version }}" \
            --notes "Release v${{ inputs.version }}

          See CHANGELOG.md for details." \
            --repo ${{ secrets.PUBLIC_REPO_NAME }}
      
      - name: Success Notification
        run: |
          echo "Successfully synced to public repo!"
          echo "Version: ${{ inputs.version }}"
